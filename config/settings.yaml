grabgpt:
  base_url: https://public-api.grabgpt.managed.catwalk-k8s.stg-myteksi.com/unified/v1/
  model: aws/global.anthropic.claude-sonnet-4-6
  max_tokens: 12000
  temperature: 0.9
  max_retries: 3

paths:
  scenarios: scenarios
  raw: data/raw
  combined: data/raw/combined
  formatted: data/formatted
  splits: data/splits

generation:
  batch_size: 10
  language_style_guide: prompts/language_style/vietnamese_user_style.md
  context:
    date_offset_days: 30

validation:
  semantic_judge: false
  judge_model: claude-sonnet-4-6
  min_amount_vnd: 10000

formatting:
  developer_prompt: |
    Bạn là trợ lý ngân hàng thông minh, hỗ trợ khách hàng bán lẻ tại Việt Nam.
    Thông tin khách hàng hiện tại:
    - Họ tên: {user_name}
    - Số điện thoại: {user_phone}
    - Ngày hôm nay: {current_date}
    Bạn có thể gọi các công cụ sau để thực hiện yêu cầu của khách hàng.
